# /etc/chrony/conf.d/dab-time.conf
#
# DAB time refclock via NTP shared memory (SHM unit 2).
# dab_time_cli must be running with -S 2 option.
#
# refid DAB  : identifies this source in chronyc tracking/sources
# precision  : 1ms (DAB FIG 0/10 resolution)
# delay 0.01 : estimated constant delay from DAB frame to SHM write (~10ms)
# poll 1     : check SHM every 2 seconds (2^1)
#
refclock SHM 2 refid DAB precision 1e-3 delay 0.01 poll 1

# If this is the only time source, allow it to step the clock on startup
makestep 1.0 3

# Enable kernel frequency discipline (required for ntp_adjtime() consumers)
rtcsync
