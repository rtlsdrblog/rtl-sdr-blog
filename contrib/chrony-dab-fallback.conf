# /etc/chrony/conf.d/dab-time.conf
#
# DAB time refclock with NTP fallback.
# Uses DAB when RTL-SDR is connected, falls back to NTP when unavailable.
#
# dab_time_cli must be running with -S 2 option.
# When dab_time_cli stops (USB removed, signal lost), SHM goes stale
# and chrony automatically switches to NTP servers.
#
refclock SHM 2 refid DAB precision 1e-3 delay 0.01 poll 1 prefer

# NTP fallback servers (used when DAB is unavailable)
pool pool.ntp.org iburst
server svl2.ntp.netnod.se iburst

# Step clock if offset > 0.5s (first 3 updates after start)
makestep 0.5 3

# Enable kernel frequency discipline (required for ntp_adjtime() consumers)
rtcsync
